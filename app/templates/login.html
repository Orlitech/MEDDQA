<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MedDQA · Clinical Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Professional Inter & Fallback Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 30%, #eef2ff, #e0e7ff);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* subtle medical pattern overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-repeat: repeat;
            background-size: 28px;
            pointer-events: none;
            opacity: 0.5;
        }

        /* Main card - elevated, crisp, modern clinical style */
        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(0px);
            border-radius: 32px;
            padding: 2rem 2rem 2.2rem;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.12), 0 1px 3px rgba(0, 0, 0, 0.02), inset 0 1px 0 rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.2s ease;
        }

        /* Header area: refined spacing and icon hierarchy */
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-icon {
            background: linear-gradient(145deg, #4f46e5, #6366f1);
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 24px;
            margin: 0 auto 1rem auto;
            box-shadow: 0 10px 18px -6px rgba(79, 70, 229, 0.25);
        }

        .brand-icon i {
            font-size: 28px;
            color: white;
        }

        .login-header h3 {
            font-weight: 700;
            font-size: 1.75rem;
            letter-spacing: -0.3px;
            color: #0f172a;
            margin-bottom: 0.25rem;
        }

        .login-header p {
            color: #475569;
            font-size: 0.875rem;
            font-weight: 400;
            margin-top: 0.25rem;
        }

        .badge-clinical {
            background: #eef2ff;
            color: #4f46e5;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.2rem 0.7rem;
            display: inline-block;
            margin-top: 0.5rem;
            letter-spacing: 0.2px;
        }

        /* form group refinements */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .input-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .input-label i {
            color: #6366f1;
            font-size: 1rem;
        }

        .form-control {
            height: 52px;
            border: 1.5px solid #e2e8f0;
            border-radius: 18px;
            padding: 0 1rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: #0f172a;
            background-color: #fefefe;
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .form-control:focus {
            border-color: #818cf8;
            outline: none;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            background-color: #ffffff;
        }

        .form-control::placeholder {
            color: #94a3b8;
            font-weight: 400;
            font-size: 0.85rem;
        }

        /* Modern login button - clean, gradient but professional */
        .btn-login {
            width: 100%;
            height: 52px;
            background: linear-gradient(105deg, #4f46e5 0%, #6366f1 100%);
            color: white;
            border: none;
            border-radius: 28px;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.2px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 0.25rem;
            box-shadow: 0 8px 18px -8px rgba(79, 70, 229, 0.4);
        }

        .btn-login:hover {
            transform: translateY(-1px);
            background: linear-gradient(105deg, #4338ca, #4f46e5);
            box-shadow: 0 12px 22px -10px rgba(79, 70, 229, 0.5);
        }

        .btn-login:active {
            transform: translateY(1px);
            transition: 0.05s;
        }

        /* alert styling consistent with clinical UI */
        .alert-custom {
            border-radius: 20px;
            background-color: #fff5f5;
            border-left: 4px solid #ef4444;
            color: #b91c1c;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.85rem 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
        }

        .alert-custom i {
            font-size: 1.2rem;
        }

        /* extra footer / secure note */
        .secure-note {
            text-align: center;
            margin-top: 1.8rem;
            font-size: 0.7rem;
            color: #6c757d;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            border-top: 1px solid #ecfdf5;
            padding-top: 1.2rem;
            letter-spacing: 0.2px;
        }

        .secure-note i {
            font-size: 0.75rem;
            color: #10b981;
        }

        /* Responsive fine-tune */
        @media (max-width: 480px) {
            .login-card {
                padding: 1.6rem;
                border-radius: 28px;
            }
            .brand-icon {
                width: 48px;
                height: 48px;
            }
            .brand-icon i {
                font-size: 24px;
            }
            .login-header h3 {
                font-size: 1.5rem;
            }
        }

        /* remove default bootstrap glow conflicts */
        .btn:focus, .btn-close:focus {
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="brand-icon">
                <i class="bi bi-clipboard2-pulse-fill"></i>
            </div>
            <h3>MedDQA</h3>
            <p>Clinical Data Quality Assurance</p>
            <div class="badge-clinical">
                <i class="bi bi-shield-check me-1"></i> DQA TEAM · Compliant
            </div>
        </div>

        <!-- Dynamic error alert (exactly preserves API behaviour) -->
        <div id="loginError" class="alert-custom" style="display:none;">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span id="errorMessage"></span>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <div class="input-label">
                    <i class="bi bi-person-circle"></i>
                    <span>Username / Email</span>
                </div>
                <input type="text" id="username" class="form-control" placeholder="Enter your clinical username" required autofocus>
            </div>

            <div class="form-group">
                <div class="input-label">
                    <i class="bi bi-lock-fill"></i>
                    <span>Password</span>
                </div>
                <input type="password" id="password" class="form-control" placeholder="··········" required>
            </div>

            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right" style="font-size: 1rem;"></i> 
                <span>Secure Sign In</span>
            </button>
        </form>

        <div class="secure-note">
            <i class="bi bi-database-check"></i>
            <span>Encrypted session · Role-based access</span>
        </div>
    </div>

    <script>
       
async function handleLogin(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('loginError');
    const errorSpan = document.getElementById('errorMessage');
    
    errorDiv.style.display = 'none';
    
    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        
        const data = await res.json();
        
        if (data.success) {
            // ✅ Store in localStorage
            localStorage.setItem('meddqa_token', data.token);
            localStorage.setItem('meddqa_user', JSON.stringify(data.user));
            
            // ✅ ALSO set as cookie (so the server can read it)
            document.cookie = `meddqa_token=${data.token}; path=/; max-age=43200; SameSite=Lax`;
            
            // ✅ Redirect to main page
            window.location.href = '/';
        } else {
            errorSpan.textContent = data.detail || 'Authentication failed.';
            errorDiv.style.display = 'flex';
        }
    } catch(e) {
        errorSpan.textContent = 'Connection error. Unable to reach MedDQA services.';
        errorDiv.style.display = 'flex';
    }
}
    </script>
</body>
</html>
